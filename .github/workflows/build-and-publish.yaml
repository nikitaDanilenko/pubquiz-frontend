name: Build and Publish

on:
  push:
    branches:
      - "main"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
  queue: max

permissions: {}

jobs:
  determine_changes:
    name: Determine Changes and Version
    runs-on: ubuntu-latest
    outputs:
      version-tag: ${{ steps.semantic-version.outputs.version_tag }}
      version: ${{ steps.semantic-version.outputs.version }}
      src-changed: ${{ steps.paths.outputs.src }}
      deployment-changed: ${{ steps.paths.outputs.deployment }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        # Depth setting is necessary for the semantic-version action.
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Determine version
        id: semantic-version
        uses: paulhatch/semantic-version@502226b17e3e242e4befd0a45690fcbb27dd1373 # v6.0.3
        with:
          # Since version 6.0.0, the action uses conventional commits.
          major_pattern: "/(major)/i"
          minor_pattern: "/(minor)/i"
      - name: Check changed paths
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: paths
        with:
          filters: |
            src:
              - 'public/**'
              - 'src/**'
              - 'elm.json'
              - 'elmapp.config.js'
              - 'package.json'
              - 'nginx.conf'
              - 'Dockerfile'
            deployment:
              - 'deployment/**'

  create_new_release:
    needs:
      - determine_changes
    name: Create New Release
    runs-on: ubuntu-latest
    if: ${{ needs.determine_changes.outputs.src-changed == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Publish new release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION_TAG: ${{ needs.determine_changes.outputs.version-tag }}
          TARGET_SHA: ${{ github.sha }}
        run: gh release create "$VERSION_TAG" --target "$TARGET_SHA" --generate-notes

  build_and_publish:
    needs:
      - determine_changes
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    # The output is a string, hence the string comparison.
    if: ${{ needs.determine_changes.outputs.src-changed == 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Set metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: nikitadanilenko/pubquiz-front-end
          tags: |
            type=sha
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ needs.determine_changes.outputs.version-tag }}
      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update_gitops:
    needs:
      - determine_changes
      - build_and_publish
    name: Update GitOps Repository
    runs-on: ubuntu-latest
    if: |
      !failure() &&
      (needs.determine_changes.outputs.src-changed == 'true' || needs.determine_changes.outputs.deployment-changed == 'true')
    steps:
      - name: Check out source repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: ${{ github.workspace }}/source
          persist-credentials: false

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.GITOPS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.GITOPS_BOT_PRIVATE_KEY }}
          owner: nikitaDanilenko
          repositories: git-ops
          permission-contents: write
          permission-pull-requests: write

      - name: Check out GitOps repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: nikitaDanilenko/git-ops
          token: ${{ steps.app-token.outputs.token }}
          path: ${{ github.workspace }}/git-ops
          persist-credentials: false

      - name: Update templates and image tag
        env:
          GITOPS_DIR: ${{ github.workspace }}/git-ops/pubquiz
          SOURCE_DIR: ${{ github.workspace }}/source/deployment
          VERSION: ${{ needs.determine_changes.outputs.version }}
        run: |
          # Careful: The target is called 'pubquiz' in GitOps, because it contains the entire application.
          mkdir -p "$GITOPS_DIR/templates/frontend"

          rsync -av --delete "$SOURCE_DIR/templates/" "$GITOPS_DIR/templates/frontend/"

          yq -i ".frontend.image.tag = \"$VERSION\"" "$GITOPS_DIR/values.yaml"

      - name: Determine commit title
        id: commit
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: echo "title=$(echo "$COMMIT_MSG" | head -n 1)" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: ${{ github.workspace }}/git-ops
          branch: deploy/pubquiz-frontend-${{ needs.determine_changes.outputs.version }}
          delete-branch: true
          title: "Deploy `pubquiz-frontend:${{ needs.determine_changes.outputs.version }}`"
          body: |
            Automated deployment PR for `pubquiz-frontend`.

            **Version:** `${{ needs.determine_changes.outputs.version }}`
            **Triggered by:** [${{ steps.commit.outputs.title }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          commit-message: "Update pubquiz-frontend to ${{ needs.determine_changes.outputs.version }}"
          labels: |
            deployment
            automated
