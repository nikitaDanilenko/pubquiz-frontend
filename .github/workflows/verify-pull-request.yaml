name: Verify Pull Request

on:
  pull_request:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Elm, and elm-test
        run: |
          npm install elm -g
          npm install elm-test -g

      - name: Run tests
        run: elm-test
