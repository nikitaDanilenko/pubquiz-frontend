name: Verify Pull Request

on:
  pull_request:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Elm, and elm-test
        run: |
          npm install elm -g
          npm install elm-test -g

      - name: Run tests
        run: elm-test
