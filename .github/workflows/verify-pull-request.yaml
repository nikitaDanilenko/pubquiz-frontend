name: Verify Pull Request

on:
  pull_request:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Elm, and elm-test
        run: |
          npm install elm -g
          npm install elm-test -g

      - name: Run tests
        run: elm-test
