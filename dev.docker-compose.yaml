services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pubquiz
      POSTGRES_PASSWORD: pubquiz
      POSTGRES_DB: pubquiz
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pubquiz"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: nikitadanilenko/pubquiz-server:latest
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://pubquiz:pubquiz@postgres:5436/pubquiz
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

