services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pubquiz
      POSTGRES_PASSWORD: pubquiz
      POSTGRES_DB: pubquiz
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pubquiz"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: nikitadanilenko/pubquiz-server:latest
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_HOST: postgres
      DATABASE_NAME: pubquiz
      DATABASE_USER: pubquiz
      DATABASE_PASSWORD: pubquiz
      DATABASE_PORT: 5432
      ORGANIZER_ADMIN_NAME: admin
      # Clear text: admin-password, + extra $ for escaping in docker-compose
      ORGANIZER_ADMIN_HASH: "$$2a$$12$$lBcqLiXoYrYWbB9wBsGR1O4URhKqeKu7IPIeI/Tz20mmVxDO5QAla"
      ORGANIZER_USER_NAME: user
      # Clear text: user-password, + extra $ for escaping in docker-compose
      ORGANIZER_USER_HASH: "$$2a$$12$$39ibS7x8yf8f0vTERWD7Peh3tk.q3EsEX7kP4uwhYM/YODk/swXDC"
      JWT_SECRET: dev-jwt-secret-that-is-at-least-32-characters-long
      JWT_EXPIRATION_SECONDS: 86400
    depends_on:
      postgres:
        condition: service_healthy

  # Run under localhost:8092, with
  # System: PostgreSQL
  # Server: postgres (the docker service name)
  # Username: pubquiz
  # Password: pubquiz
  # Database: pubquiz
  adminer:
    image: adminer:latest
    ports:
      - "8092:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
